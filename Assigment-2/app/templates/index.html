<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    h1 {
      color: #333;
      margin-bottom: 28px;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .add-form input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: #667eea; }

    .add-form button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .add-form button:hover { opacity: 0.9; }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #f8f9ff;
      border: 1px solid #eee;
      transition: transform 0.1s;
    }

    .todo-item:hover { transform: translateX(3px); }

    .todo-item.done { background: #f0fff4; border-color: #c3e6cb; }

    .todo-text {
      font-size: 15px;
      color: #333;
      flex: 1;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .actions { display: flex; gap: 8px; }

    .btn-complete {
      padding: 6px 12px;
      background: #28a745;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-delete {
      padding: 6px 12px;
      background: #dc3545;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 30px 0;
      font-size: 15px;
    }

    .count {
      font-size: 13px;
      color: #888;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#9989; To-Do List</h1>

    <form class="add-form" action="/add" method="POST">
      <input type="text" name="task" placeholder="Add a new task..." required autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    {% if todos %}
      <p class="count">{{ todos|length }} task(s) total</p>
      <ul class="todo-list">
        {% for todo in todos %}
        <li class="todo-item {% if todo.done %}done{% endif %}">
          <span class="todo-text">{{ todo.task }}</span>
          <div class="actions">
            {% if not todo.done %}
            <a class="btn-complete" href="/complete/{{ todo._id }}">Done</a>
            {% endif %}
            <a class="btn-delete" href="/delete/{{ todo._id }}">Delete</a>
          </div>
        </li>
        {% endfor %}
      </ul>
    {% else %}
      <p class="empty">No tasks yet. Add one above!</p>
    {% endif %}
  </div>
</body>
</html>
